<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <meta
      name="description"
      content="WaveTune - Player de música profissional"
    />
    <meta name="theme-color" content="#2563eb" />

    <title>WaveTune - Player de Música</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
  </head>

  <body>
    <header>
      <div class="logo">
        <div class="logo-icon">~</div>
        <h1>WaveTune</h1>
      </div>

      <button id="fullscreenBtn">⛶</button>
    </header>

    <div class="container">
      <aside class="playlist">
        <ul id="playlist"></ul>
      </aside>

      <main class="player">
        <h2 id="title">Nenhuma música carregada</h2>
        <p id="artist">Local</p>

        <div class="time">
          <span id="current">0:00</span> /
          <span id="duration">0:00</span>
        </div>

        <input type="range" id="progress" min="0" max="100" value="0" />

        <div class="controls">
          <button id="prev">⏮</button>
          <button id="play">▶</button>
          <button id="next">⏭</button>
        </div>

        <label class="add">
          Adicionar músicas
          <input type="file" id="fileInput" accept="audio/*" multiple hidden />
        </label>
      </main>
    </div>

    <footer>
      <p class="signature">Anderson Fonseca</p>
    </footer>

    <script src="script.js" defer></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
